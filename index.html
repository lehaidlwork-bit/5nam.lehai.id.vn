<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 năm của anh và em 💖</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:#fff;
    text-align:center;
    overflow-x:hidden;
    background: radial-gradient(circle at 20% 20%, #ff9a9e, transparent),
                radial-gradient(circle at 80% 80%, #fad0c4, transparent),
                linear-gradient(135deg,#1a1a2e,#16213e);
}

body::before{
    content:'';
    position:fixed;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size:50px 50px;
    animation:moveBg 25s linear infinite;
}
@keyframes moveBg{
    to{transform:translate(-200px,-200px)}
}

.container{max-width:900px;margin:auto;padding:30px}

.heart{font-size:50px;animation:beat 1s infinite}
@keyframes beat{50%{transform:scale(1.2)}}

.card{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    text-align:left;
    line-height:1.7;

    box-shadow:0 0 30px rgba(255,255,255,0.1);
}

#typedText{
    white-space:pre-line;
    border-right:2px solid white;
    animation:blink 1s infinite;
}
@keyframes blink{50%{border-color:transparent}}

.highlight{
    font-size:28px;
    font-weight:bold;
    text-align:center;
    display:block;
    margin-top:20px;
    text-shadow:0 0 20px rgba(255,255,255,0.9);
    animation:glow 2s infinite alternate;
}
@keyframes glow{
    from{opacity:0.6}
    to{opacity:1}
}
/* 💖 background floating icons */
.bg-heart{
    position:fixed;
    font-size:20px;
    color:rgba(255,255,255,0.15);
    pointer-events:none;
    animation:floatBg linear infinite;
    z-index:0;
}

@keyframes floatBg{
    from{
        transform:translateY(100vh) scale(0.8);
        opacity:0;
    }
    20%{opacity:1;}
    to{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}
.gallery{
    display:grid;
    grid-template-columns:repeat(5,120px);
    gap:12px;
    justify-content:center;
    margin-top:40px;
}

/* Hàng 1 */
.gallery img:nth-child(1){grid-column:1;grid-row:1;}
.gallery img:nth-child(2){grid-column:2;grid-row:1;}
.gallery img:nth-child(3){grid-column:3;grid-row:1;}
.gallery img:nth-child(4){grid-column:4;grid-row:1;}
.gallery img:nth-child(5){grid-column:5;grid-row:1;}

/* Cột trái */
.gallery img:nth-child(6){grid-column:1;grid-row:2;}
.gallery img:nth-child(7){grid-column:1;grid-row:3;}

/* Ngang giữa */
.gallery img:nth-child(8){grid-column:1;grid-row:4;}
.gallery img:nth-child(9){grid-column:2;grid-row:4;}
.gallery img:nth-child(10){grid-column:3;grid-row:4;}
.gallery img:nth-child(11){grid-column:4;grid-row:4;}
.gallery img:nth-child(12){grid-column:5;grid-row:4;}

/* Cột phải */
.gallery img:nth-child(13){grid-column:5;grid-row:5;}
.gallery img:nth-child(14){grid-column:5;grid-row:6;}

/* Hàng cuối */
.gallery img:nth-child(15){grid-column:1;grid-row:7;}
.gallery img:nth-child(16){grid-column:2;grid-row:7;}
.gallery img:nth-child(17){grid-column:3;grid-row:7;}
.gallery img:nth-child(19){grid-column:4;grid-row:7;}
.gallery img:nth-child(18){grid-column:5;grid-row:7;}

.gallery img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:18px;
    cursor:pointer;
    transition:0.4s;
    border:3px solid rgba(255,255,255,0.9);

    box-shadow:
        0 0 10px rgba(255,255,255,0.25),
        0 0 25px rgba(255,192,203,0.25);
}

.gallery img:hover{
    transform:scale(1.08) rotate(1deg);

    box-shadow:
        0 0 20px rgba(255,255,255,0.5),
        0 0 35px rgba(255,182,193,0.6);
}
.lightbox{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    justify-content:center;
    align-items:center;
}
.lightbox img{max-width:90%;max-height:90%}

.floating-heart{
    position:fixed;
    bottom:-10px;
    animation:floatUp 5s linear infinite;
}
@keyframes floatUp{to{transform:translateY(-100vh)}}

.snow{
    position:fixed;
    width:100%;height:100%;
    pointer-events:none;
}
.snow span{
    position:absolute;
    width:4px;height:4px;
    background:white;
    border-radius:50%;
    animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(100vh)}}

.time{margin-top:25px;font-weight:bold}
  
</style>
</head>

<body>

<audio id="bgMusic" autoplay loop muted>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="snow" id="snow"></div>

<div class="container">
<div class="heart">❤️</div>
<h1>Hành trình của anh và em 💖</h1>

<div class="card">
<p id="typedText"></p>
</div>

<div class="gallery">
<img src="img1.jpg"><img src="img2.jpg"><img src="img3.jpg"><img src="img4.jpg">
<img src="img5.jpg"><img src="img6.jpg"><img src="img7.jpg"><img src="img8.jpg">
<img src="img9.jpg"><img src="img10.jpg"><img src="img11.jpg"><img src="img12.jpg">
<img src="img13.jpg"><img src="img14.jpg"><img src="img15.jpg"><img src="img16.jpg">
<img src="img17.jpg"><img src="img19.jpg"><img src="img20.jpg">
</div>

<div class="time" id="loveTime"></div>
</div>

<script>
// bật nhạc khi click
document.addEventListener("click",()=>{
let m=document.getElementById("bgMusic");
m.muted=false;
m.play();
},{once:true});

// FULL TEXT
const text = `💖 CÂU CHUYỆN CỦA ANH VÀ EM

Ngày 15/04/2021, mọi thứ bắt đầu theo một cách rất tình cờ.
Chỉ là một lần lướt Facebook như bao ngày khác, rồi anh nhìn thấy em. Không có lý do gì đặc biệt, chỉ là một cảm giác rất nhẹ — đủ để anh nhấn vào, và chủ động nhắn cho em một tin: “Chào em, mình làm quen nhé?”

Có lẽ lúc đó, cả hai đều không nghĩ rằng chỉ từ một tin nhắn đơn giản như vậy, lại có thể mở ra một câu chuyện dài đến thế.

Những ngày sau đó là những cuộc trò chuyện rất bình thường. Không có gì quá đặc biệt, cũng không có điều gì chắc chắn. Chỉ là hai người xa lạ, nói chuyện với nhau mỗi ngày một chút, rồi dần dần trở thành thói quen lúc nào không hay.

Và rồi đến ngày 09/05/2021 — một ngày mà anh vẫn luôn nhớ rất rõ.
Em nhắn cho anh một câu mà có lẽ anh sẽ không bao giờ quên:

“Em đồng ý cho anh làm người yêu em đó.”

Không phải là một lời tỏ tình quá hoa mỹ, nhưng lại đủ để làm tim anh lúc đó rung lên theo một cách rất thật.

Anh và em bắt đầu từ đó.

Nhưng tình yêu của anh và em lại không giống như những câu chuyện bình thường khác.
Suốt 8 tháng đầu tiên, anh và em chỉ có thể nhìn thấy nhau qua màn hình điện thoại. Không có những buổi đi chơi, không có những cái nắm tay, không có cả những lần gặp mặt trực tiếp… chỉ có những tin nhắn, những cuộc gọi, và sự chờ đợi.

Dịch bệnh đã giữ hai đứa ở hai nơi khác nhau, nhưng lại không thể giữ được cảm xúc của anh và em.

Và rồi, sau tất cả những ngày chỉ nhìn nhau qua màn hình,
mùng 3 Tết năm 2022 — anh và em cuối cùng cũng gặp nhau.

Không cần phải là một điều gì quá lớn lao,
chỉ cần được đứng trước mặt nhau, nhìn thấy nhau thật sự…
là đủ để hiểu rằng mọi chờ đợi trước đó đều xứng đáng.

Khoảnh khắc đó, có lẽ là một trong những điều đẹp nhất mà anh từng có.

Trong suốt quãng thời gian bên nhau, anh và em không phải lúc nào cũng suôn sẻ.
Có những lúc quen nhau được vài tháng, có những lúc kéo dài đến cả một năm. Có những lần gần nhau, và cũng có những lần phải tạm xa nhau.

Nhưng lạ là, dù có đi qua bao nhiêu lần như vậy,
anh và em vẫn quay lại bên nhau.

Không phải vì không có lựa chọn khác,
mà là vì sau tất cả, anh và em vẫn chọn nhau.

Và rồi, đến ngày 06/09/2024 —
một cột mốc khác, một thử thách khác.

Ngày em sang Hàn Quốc.

Từ lúc đó, tình yêu của anh và em chính thức bước vào một hành trình mới — hành trình của khoảng cách.

Yêu xa không chỉ là nhớ.
Mà là những lần muốn gặp nhưng không thể,
là những lúc mệt mỏi nhưng chỉ có thể hỏi nhau qua màn hình,
là học cách tin tưởng nhiều hơn, kiên nhẫn nhiều hơn, và trưởng thành hơn.

Khoảng cách khiến mọi thứ trở nên khó khăn hơn,
nhưng cũng làm cho tình yêu của anh và em trở nên rõ ràng hơn bao giờ hết.

Sau tất cả, anh và em vẫn ở đây.
Vẫn là hai người đã từng bắt đầu từ một tin nhắn rất đơn giản,
nhưng lại cùng nhau đi qua rất nhiều điều không hề đơn giản.

5 năm — không phải là quãng thời gian quá dài đối với một đời người,
nhưng đủ dài để anh hiểu em quan trọng với anh như thế nào.

Đủ để anh biết rằng tình yêu không chỉ là những lúc vui,
mà còn là những lúc vẫn chọn ở lại, ngay cả khi mọi thứ không dễ dàng.

💌 LỜI ANH MUỐN NÓI

Và sau tất cả những điều đã đi qua,
anh chỉ muốn nói một điều rất đơn giản.

Cảm ơn em vì đã bước vào cuộc đời anh một cách rất tình cờ,
nhưng lại ở lại một cách rất thật lòng.

Cảm ơn em vì đã cùng anh đi qua những ngày rất bình thường,
và cả những ngày không dễ dàng.

Cảm ơn em vì đã kiên nhẫn,
vì đã không rời đi,
dù có những lúc khoảng cách và cuộc sống khiến mọi thứ trở nên khó khăn hơn.

Có thể anh và em không hoàn hảo,
nhưng suốt 5 năm qua,
điều anh luôn chắc chắn…

là anh chưa từng hối hận vì đã chọn yêu em.

Anh từng nghĩ…
nếu một ngày mình không còn đi cùng nhau nữa,
thì có lẽ anh vẫn sẽ ổn thôi.

Nhưng rồi anh nhận ra,
điều anh sợ không phải là mất đi một mối quan hệ…

mà là mất đi em —
người đã ở bên anh suốt cả một hành trình.

Và đến lúc đó anh mới hiểu…

sau tất cả,
anh chưa từng chuẩn bị cho một cuộc sống không có em.`;

// typewriter + slow ending
let i=0;
function type(){
let speed = (i > text.length - 200) ? 60 : 20;
if(i<text.length){
document.getElementById("typedText").innerHTML += text.charAt(i);
i++;
setTimeout(type,speed);
}else{
endScene();
}}
type();

// cinematic ending
function endScene(){
let el=document.getElementById("typedText");
el.innerHTML += `<span class="highlight">Yêu Em 😘</span>`;

let m=document.getElementById("bgMusic");
let vol=1;
let fade=setInterval(()=>{
if(vol>0){
vol-=0.05;
m.volume=vol;
}else clearInterval(fade);
},200);
}

// hiệu ứng
setInterval(()=>{
let h=document.createElement("div");
h.className="floating-heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},400);

let snow=document.getElementById("snow");
for(let i=0;i<60;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(3+Math.random()*5)+"s";
snow.appendChild(s);
}

// zoom ảnh
document.querySelectorAll(".gallery img").forEach(img=>{
img.onclick=()=>{
let box=document.createElement("div");
box.className="lightbox";
box.innerHTML=`<img src="${img.src}">`;
box.onclick=()=>box.remove();
document.body.appendChild(box);
}
});
// 💖 floating background hearts
setInterval(()=>{
    let bg=document.createElement("div");
    bg.className="bg-heart";

    const icons=["💖","🤍","✨","💕"];
    bg.innerHTML=icons[Math.floor(Math.random()*icons.length)];

    bg.style.left=Math.random()*100+"vw";
    bg.style.animationDuration=(10+Math.random()*10)+"s";
    bg.style.fontSize=(15+Math.random()*25)+"px";

    document.body.appendChild(bg);

    setTimeout(()=>{
        bg.remove();
    },20000);

},800);
// đếm ngày
const start=new Date("2021-05-09");
setInterval(()=>{
let d=Math.floor((new Date()-start)/86400000);
document.getElementById("loveTime").innerHTML="Đã bên nhau: "+d+" ngày 💕";
},1000);
</script>

</body>
</html>
